<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcode Audio Player</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  h1 { font-size: 1.4rem; opacity: 0.85; letter-spacing: 0.03em; }
  #status {
    font-size: 0.9rem;
    opacity: 0.6;
    min-height: 1.4em;
    text-align: center;
  }
  #toggle-btn {
    font-size: 2.5rem;
    padding: 18px 36px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    background: #2a5298;
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #toggle-btn:hover { background: #3060b0; transform: scale(1.04); }
  #toggle-btn.active { background: #1a8a4a; }
  #toggle-btn.error  { background: #8a1a1a; }
  .hint {
    font-size: 0.78rem;
    opacity: 0.45;
    text-align: center;
    max-width: 320px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<h1 id="title">🖥️ Webcode Desktop Audio</h1>
<button id="toggle-btn"></button>
<div id="status"></div>
<p class="hint" id="hint"></p>

<script>
(function () {
  'use strict';

  // ── i18n ───────────────────────────────────────────────
  var MESSAGES = {
    'zh-CN': {
      title: '🖥️ Webcode 桌面音频',
      btn_start: '🔇 开启音频',
      btn_stop: '🔊 停止音频',
      btn_connecting: '⏳ 连接中…',
      hint: '浏览器安全策略要求用户主动点击才能播放音频。<br>音频经由 PulseAudio → Opus 64kbps → WebSocket 实时传输，延迟约 30ms。',
      status_idle: '点击按钮开始播放容器桌面音频',
      status_stopped: '已停止',
      status_connecting: '正在连接 WebSocket 音频服务…',
      status_connected: '已连接，等待音频流…',
      status_closed: '连接已关闭',
      status_playing: 'Opus {bitrate}kbps @ {sr}Hz — 正在播放…',
      err_audio_ctx: '错误：无法创建 AudioContext — {msg}',
      err_ws_create: '错误：WebSocket 连接失败 — {msg}',
      err_ws_disconnected: '错误：WebSocket 连接断开',
    },
    'en-US': {
      title: '🖥️ Webcode Desktop Audio',
      btn_start: '🔇 Start Audio',
      btn_stop: '🔊 Stop Audio',
      btn_connecting: '⏳ Connecting…',
      hint: 'Browser security requires a user click before audio can play.<br>Audio is streamed via PulseAudio → Opus 64kbps → WebSocket with ~30ms latency.',
      status_idle: 'Click the button to start playing container desktop audio',
      status_stopped: 'Stopped',
      status_connecting: 'Connecting to WebSocket audio service…',
      status_connected: 'Connected, waiting for audio stream…',
      status_closed: 'Connection closed',
      status_playing: 'Opus {bitrate}kbps @ {sr}Hz — Playing…',
      err_audio_ctx: 'Error: cannot create AudioContext — {msg}',
      err_ws_create: 'Error: WebSocket connection failed — {msg}',
      err_ws_disconnected: 'Error: WebSocket disconnected',
    },
  };

  function pickLang() {
    var nav = (navigator.language || navigator.userLanguage || 'en-US').toLowerCase();
    if (nav.indexOf('zh') === 0) return 'zh-CN';
    return 'en-US';
  }

  var LANG = pickLang();
  document.documentElement.lang = LANG;

  function t(key, vars) {
    var s = (MESSAGES[LANG] && MESSAGES[LANG][key]) || MESSAGES['en-US'][key] || key;
    if (vars) {
      Object.keys(vars).forEach(function (k) {
        s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]);
      });
    }
    return s;
  }

  // ── Initial UI ─────────────────────────────────────────
  document.getElementById('title').textContent = t('title');
  document.getElementById('hint').innerHTML = t('hint');

  var SAMPLE_RATE = 48000;  // Opus native rate
  var CHANNELS = 2;

  var btn    = document.getElementById('toggle-btn');
  var status = document.getElementById('status');

  btn.textContent = t('btn_start');
  status.textContent = t('status_idle');

  var audioCtx       = null;
  var ws             = null;
  var nextPlayTime   = 0;
  var active         = false;
  var audioDecoder   = null;
  var opusTimestamp  = 0;
  var codecOpus      = false;

  function setStatus(msg) { status.textContent = msg; }

  function stopAudio() {
    active = false;
    codecOpus = false;
    opusTimestamp = 0;
    btn.textContent = t('btn_start');
    btn.className = '';
    setStatus(t('status_stopped'));
    if (audioDecoder) { try { audioDecoder.close(); } catch (e) {} audioDecoder = null; }
    if (ws)           { ws.close(); ws = null; }
    if (audioCtx)     { audioCtx.close(); audioCtx = null; }
  }

  // ── Opus decoder via WebCodecs AudioDecoder ──────────────
  function initOpusDecoder(info) {
    if (!window.AudioDecoder) {
      console.warn('[audio-player] AudioDecoder not available, falling back to raw PCM');
      return;
    }
    var sr = info.sample_rate || 48000;
    var ch = info.channels || 2;
    setStatus(t('status_playing', { bitrate: info.bitrate / 1000, sr: sr }));

    if (audioDecoder) { try { audioDecoder.close(); } catch (e) {} }
    opusTimestamp = 0;

    audioDecoder = new AudioDecoder({
      output: function (audioData) {
        if (!audioCtx) { audioData.close(); return; }
        var numFrames   = audioData.numberOfFrames;
        var numChannels = audioData.numberOfChannels;
        var sampleRate  = audioData.sampleRate;
        var buffer = audioCtx.createBuffer(numChannels, numFrames, sampleRate);
        for (var c = 0; c < numChannels; c++) {
          var plane = new Float32Array(numFrames);
          audioData.copyTo(plane, { planeIndex: c, format: 'f32-planar' });
          buffer.copyToChannel(plane, c);
        }
        audioData.close();
        var source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        var now = audioCtx.currentTime;
        if (nextPlayTime < now) nextPlayTime = now + 0.005;
        source.start(nextPlayTime);
        nextPlayTime += buffer.duration;
      },
      error: function (e) { console.error('[audio-player] AudioDecoder error:', e); },
    });

    audioDecoder.configure({ codec: 'opus', sampleRate: sr, numberOfChannels: ch });
    codecOpus = true;
  }

  function startAudio() {
    active = true;
    btn.textContent = t('btn_connecting');
    btn.className = '';
    setStatus(t('status_connecting'));

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
    } catch (e) {
      setStatus(t('err_audio_ctx', { msg: e.message }));
      stopAudio();
      return;
    }

    nextPlayTime = audioCtx.currentTime + 0.02;

    var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';

    // Through unified proxy (noVNC at /proxy/10004/) → audio at /proxy/10006/audio
    // Direct dev mode → root /audio (audio-ws-server doesn't parse path)
    var basePath = location.pathname.match(/\/proxy\/10004\//) ? '/proxy/10006/' : '/';
    var wsUrl = protocol + '//' + location.host + basePath + 'audio';
    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      setStatus(t('err_ws_create', { msg: e.message }));
      stopAudio();
      return;
    }

    ws.binaryType = 'arraybuffer';

    ws.onopen = function () {
      btn.textContent = t('btn_stop');
      btn.className = 'active';
      setStatus(t('status_connected'));
    };

    ws.onerror = function () {
      setStatus(t('err_ws_disconnected'));
      btn.className = 'error';
      setTimeout(stopAudio, 2000);
    };

    ws.onclose = function () {
      if (active) {
        setStatus(t('status_closed'));
        btn.className = 'error';
        setTimeout(stopAudio, 2000);
      }
    };

    ws.onmessage = function (event) {
      // Text frame: codec negotiation or control message
      if (typeof event.data === 'string') {
        var msg;
        try { msg = JSON.parse(event.data); } catch (e) { return; }
        if (msg.event === 'codec_info') { initOpusDecoder(msg); }
        return;
      }
      if (!audioCtx) return;
      if (codecOpus && audioDecoder && audioDecoder.state === 'configured') {
        // ── Opus path ────────────────────────────────────────
        try {
          audioDecoder.decode(new EncodedAudioChunk({
            type: 'key',
            timestamp: opusTimestamp,
            data: event.data,
          }));
          opusTimestamp += 20000; // 20ms per frame in µs
        } catch (e) {
          console.error('[audio-player] decode error:', e);
        }
      } else {
        // ── Fallback: raw PCM Int16 ──────────────────────────
        var raw = new Int16Array(event.data);
        var numFrames = raw.length / CHANNELS;
        if (numFrames < 1) return;
        var buffer = audioCtx.createBuffer(CHANNELS, numFrames, SAMPLE_RATE);
        for (var ch = 0; ch < CHANNELS; ch++) {
          var channelData = buffer.getChannelData(ch);
          for (var i = 0; i < numFrames; i++) {
            channelData[i] = raw[i * CHANNELS + ch] / 32768.0;
          }
        }
        var source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        var now = audioCtx.currentTime;
        if (nextPlayTime < now) nextPlayTime = now + 0.01;
        source.start(nextPlayTime);
        nextPlayTime += buffer.duration;
      }
    };
  }

  btn.addEventListener('click', function () {
    if (active) { stopAudio(); } else { startAudio(); }
  });
})();
</script>
</body>
</html>
