[Toplevel top-panel]
expand=true
orientation=top
size=24

[Toplevel bottom]
expand=true
orientation=bottom
size=24

[Object menu-bar]
module-id=org.gnome.gnome-panel.menu
applet-id=menu-bar
toplevel-id=top-panel
pack-index=0

[Object clock]
module-id=org.gnome.gnome-panel.clock
applet-id=clock
toplevel-id=top-panel
pack-type=end
pack-index=1

[Object notification-area]
module-id=org.gnome.gnome-panel.notification-area
applet-id=notification-area
toplevel-id=top-panel
pack-type=end
pack-index=2

[Object user-menu]
module-id=org.gnome.gnome-panel.menu
applet-id=user-menu
toplevel-id=top-panel
pack-type=end
pack-index=0

# 底部面板：launchpad 在最左侧，然后是显示桌面、窗口列表、工作区切换器
[Object launchpad-launcher]
object-type=launcher
launcher-location=/usr/share/applications/launchpad.desktop
toplevel-id=bottom
position=0
locked=true

[Object show-desktop]
module-id=org.gnome.gnome-panel.wncklet
applet-id=show-desktop
toplevel-id=bottom
position=10
locked=true

[Object window-list]
module-id=org.gnome.gnome-panel.wncklet
applet-id=window-list
toplevel-id=bottom
position=20
locked=true

[Object workspace-switcher]
module-id=org.gnome.gnome-panel.wncklet
applet-id=workspace-switcher
toplevel-id=bottom
pack-type=end
position=0
locked=true
