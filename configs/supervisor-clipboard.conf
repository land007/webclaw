[program:clipboard-server]
command=/usr/local/bin/node /opt/clipboard-server.js
user=ubuntu
autostart=true
autorestart=true
startretries=5
startsecs=5
priority=150
stdout_logfile=/tmp/clipboard-server_stdout.log
stderr_logfile=/tmp/clipboard-server_stderr.log
environment=NODE_ENV="production",HOME="/home/ubuntu",DISPLAY=":1",NODE_PATH="/usr/local/lib/node_modules"
