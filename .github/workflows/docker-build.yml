name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build base image (slow, but cached)
  # ─────────────────────────────────────────────────────────────
  build-base:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Wait for GitHub registry to be ready
        run: |
          echo "Waiting for ghcr.io to be accessible..."
          for i in {1..5}; do
            if curl -sS --max-time 10 https://ghcr.io/v2/ > /dev/null 2>&1; then
              echo "ghcr.io is accessible"
              break
            fi
            echo "Attempt $i/5 failed, retrying in 5s..."
            sleep 5
          done

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check disk space before build
        run: |
          echo "=== 磁盘使用情况（构建前） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            WEBCODE_VERSION=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/webclaw_base:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/webclaw_base:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/webclaw_base:latest
            ghcr.io/${{ github.repository_owner }}/webclaw_base:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=webclaw
            org.opencontainers.image.description=Base image with Code Server IDE and Supervisor
            org.opencontainers.image.source=https://github.com/land007/webclaw
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: |
            type=image,push=true,annotation-index.org.opencontainers.image.description=Base Code Server IDE image with Supervisor (no desktop)

      - name: Check disk space after build
        if: always()
        run: |
          echo "=== 磁盘使用情况（构建后） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build desktop version (with GNOME desktop, depends on base)
  # ─────────────────────────────────────────────────────────────
  build-desktop:
    needs: build-base
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta-full
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/webclaw
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.description=Full image with GNOME desktop VNC and Code Server IDE

      - name: Check disk space before build
        run: |
          echo "=== 磁盘使用情况（构建前） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

      - name: Build and push full image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            THEIA_BASE_VERSION=${{ github.sha }}
            INSTALL_DESKTOP=true
            WEBCODE_VERSION=${{ github.sha }}
          tags: ${{ steps.meta-full.outputs.tags }}
          labels: ${{ steps.meta-full.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: |
            type=image,push=true,annotation-index.org.opencontainers.image.description=Desktop image with GNOME desktop and code-server IDE plus OpenClaw

      - name: Check disk space after build
        if: always()
        run: |
          echo "=== 磁盘使用情况（构建后） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build lite version (no desktop, parallel with full)
  # ─────────────────────────────────────────────────────────────
  build-lite:
    needs: build-base
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta-lite
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/webclaw_lite
            ghcr.io/${{ github.repository_owner }}/webclaw_lite
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.description=Lite image without desktop (Code Server + Vibe Kanban + OpenClaw)

      - name: Check disk space before build
        run: |
          echo "=== 磁盘使用情况（构建前） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

      - name: Build and push lite image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            THEIA_BASE_VERSION=${{ github.sha }}
            INSTALL_DESKTOP=false
            WEBCODE_VERSION=${{ github.sha }}
          tags: ${{ steps.meta-lite.outputs.tags }}
          labels: ${{ steps.meta-lite.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: |
            type=image,push=true,annotation-index.org.opencontainers.image.description=Lite image with code-server IDE and OpenClaw (no desktop)

      - name: Check disk space after build
        if: always()
        run: |
          echo "=== 磁盘使用情况（构建后） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

  # ─────────────────────────────────────────────────────────────
  # Job 4: Build full version (desktop + 4 AI CLIs)
  # ─────────────────────────────────────────────────────────────
  build-full:
    needs: build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: image_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/metadata-action@v5
        id: meta-full-clis
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/webclaw_full
            ghcr.io/${{ github.repository_owner }}/webclaw_full
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Desktop image with code-server OpenClaw and 4 AI CLIs

      - name: Check disk space before build
        run: |
          echo "=== 磁盘使用情况（构建前） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

      - name: Build and push full+clis image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.full
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            WEBCLAW_IMAGE=ghcr.io/${{ github.repository_owner }}/webclaw
            WEBCLAW_IMAGE_TAG=${{ steps.image_tag.outputs.value }}
          tags: ${{ steps.meta-full-clis.outputs.tags }}
          labels: ${{ steps.meta-full-clis.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check disk space after build
        if: always()
        run: |
          echo "=== 磁盘使用情况（构建后） ==="
          df -h
          echo ""
          echo "=== Docker 系统使用情况 ==="
          docker system df
          echo ""

  # ─────────────────────────────────────────────────────────────
  # After build-desktop: update openclaw README + export desktop image to R2
  # ─────────────────────────────────────────────────────────────
  update-readme-desktop:
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/webclaw
          readme-filepath: ./README.md

  export-desktop-to-r2:
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Compute version label
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "label=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "image_tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "label=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install AWS CLI
        run: pip install --quiet awscli

      - name: Export webclaw (desktop) to tar.gz
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/webclaw:${{ steps.version.outputs.image_tag }}"
          AMD64_EXPORT_REF="land007/webclaw:latest"
          ARM64_EXPORT_REF="land007/webclaw:latest"

          docker pull --platform linux/amd64 "$IMAGE_REF"
          docker tag "$IMAGE_REF" "$AMD64_EXPORT_REF"
          echo "AMD64_DIGEST=$(docker inspect $AMD64_EXPORT_REF --format '{{.Id}}')" >> $GITHUB_ENV
          docker save "$AMD64_EXPORT_REF" \
            | gzip > webclaw-amd64-${{ steps.version.outputs.label }}.tar.gz

          docker pull --platform linux/arm64 "$IMAGE_REF"
          docker tag "$IMAGE_REF" "$ARM64_EXPORT_REF"
          echo "ARM64_DIGEST=$(docker inspect $ARM64_EXPORT_REF --format '{{.Id}}')" >> $GITHUB_ENV
          docker save "$ARM64_EXPORT_REF" \
            | gzip > webclaw-arm64-${{ steps.version.outputs.label }}.tar.gz

      - name: Resolve manifest digests
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/webclaw:${{ steps.version.outputs.image_tag }}"
          python3 - <<'PY' "$IMAGE_REF" >> "$GITHUB_ENV"
          import json, re, subprocess, sys

          ref = sys.argv[1]
          inspect_output = subprocess.check_output(["docker", "buildx", "imagetools", "inspect", ref], text=True)
          match = re.search(r"^Digest:\s*(sha256:[0-9a-f]+)$", inspect_output, re.MULTILINE)
          index_digest = match.group(1) if match else ""
          raw = subprocess.check_output(["docker", "buildx", "imagetools", "inspect", "--raw", ref], text=True).strip()
          index_manifest = json.loads(raw)

          def find_platform_manifest_digest(arch):
              for item in index_manifest.get("manifests", []):
                  platform = item.get("platform") or {}
                  if platform.get("os") == "linux" and platform.get("architecture") == arch:
                      return item.get("digest", "")
              return ""

          amd64_manifest_digest = find_platform_manifest_digest("amd64")
          arm64_manifest_digest = find_platform_manifest_digest("arm64")
          print(f"INDEX_DIGEST={index_digest}")
          print(f"AMD64_MANIFEST_DIGEST={amd64_manifest_digest}")
          print(f"ARM64_MANIFEST_DIGEST={arm64_manifest_digest}")
          PY

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PUBLIC_BASE_URL: https://launcher.qhkly.com
          INDEX_DIGEST: ${{ env.INDEX_DIGEST }}
          AMD64_DIGEST: ${{ env.AMD64_DIGEST }}
          ARM64_DIGEST: ${{ env.ARM64_DIGEST }}
          AMD64_MANIFEST_DIGEST: ${{ env.AMD64_MANIFEST_DIGEST }}
          ARM64_MANIFEST_DIGEST: ${{ env.ARM64_MANIFEST_DIGEST }}
        run: |
          chmod +x ./scripts/publish-r2-registry.sh
          ./scripts/publish-r2-registry.sh \
            webclaw \
            "${{ steps.version.outputs.label }}" \
            "webclaw-amd64-${{ steps.version.outputs.label }}.tar.gz" \
            "webclaw-arm64-${{ steps.version.outputs.label }}.tar.gz"

  # ─────────────────────────────────────────────────────────────
  # After build-full: update webclaw README + export full image to R2
  # ─────────────────────────────────────────────────────────────
  update-readme-full:
    needs: build-full
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/webclaw
          readme-filepath: ./README.md

  export-full-to-r2:
    needs: build-full
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Compute version label
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "label=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "image_tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "label=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install AWS CLI
        run: pip install --quiet awscli

      - name: Export webclaw_full (desktop + CLIs) to tar.gz
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/webclaw_full:${{ steps.version.outputs.image_tag }}"
          AMD64_EXPORT_REF="land007/webclaw_full:latest"
          ARM64_EXPORT_REF="land007/webclaw_full:latest"

          docker pull --platform linux/amd64 "$IMAGE_REF"
          docker tag "$IMAGE_REF" "$AMD64_EXPORT_REF"
          echo "AMD64_DIGEST=$(docker inspect $AMD64_EXPORT_REF --format '{{.Id}}')" >> $GITHUB_ENV
          docker save "$AMD64_EXPORT_REF" \
            | gzip > webclaw_full-amd64-${{ steps.version.outputs.label }}.tar.gz

          docker pull --platform linux/arm64 "$IMAGE_REF"
          docker tag "$IMAGE_REF" "$ARM64_EXPORT_REF"
          echo "ARM64_DIGEST=$(docker inspect $ARM64_EXPORT_REF --format '{{.Id}}')" >> $GITHUB_ENV
          docker save "$ARM64_EXPORT_REF" \
            | gzip > webclaw_full-arm64-${{ steps.version.outputs.label }}.tar.gz

      - name: Resolve manifest digests
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/webclaw_full:${{ steps.version.outputs.image_tag }}"
          python3 - <<'PY' "$IMAGE_REF" >> "$GITHUB_ENV"
          import json, re, subprocess, sys

          ref = sys.argv[1]
          inspect_output = subprocess.check_output(["docker", "buildx", "imagetools", "inspect", ref], text=True)
          match = re.search(r"^Digest:\s*(sha256:[0-9a-f]+)$", inspect_output, re.MULTILINE)
          index_digest = match.group(1) if match else ""
          raw = subprocess.check_output(["docker", "buildx", "imagetools", "inspect", "--raw", ref], text=True).strip()
          index_manifest = json.loads(raw)

          def find_platform_manifest_digest(arch):
              for item in index_manifest.get("manifests", []):
                  platform = item.get("platform") or {}
                  if platform.get("os") == "linux" and platform.get("architecture") == arch:
                      return item.get("digest", "")
              return ""

          amd64_manifest_digest = find_platform_manifest_digest("amd64")
          arm64_manifest_digest = find_platform_manifest_digest("arm64")
          print(f"INDEX_DIGEST={index_digest}")
          print(f"AMD64_MANIFEST_DIGEST={amd64_manifest_digest}")
          print(f"ARM64_MANIFEST_DIGEST={arm64_manifest_digest}")
          PY

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PUBLIC_BASE_URL: https://launcher.qhkly.com
          INDEX_DIGEST: ${{ env.INDEX_DIGEST }}
          AMD64_DIGEST: ${{ env.AMD64_DIGEST }}
          ARM64_DIGEST: ${{ env.ARM64_DIGEST }}
          AMD64_MANIFEST_DIGEST: ${{ env.AMD64_MANIFEST_DIGEST }}
          ARM64_MANIFEST_DIGEST: ${{ env.ARM64_MANIFEST_DIGEST }}
        run: |
          chmod +x ./scripts/publish-r2-registry.sh
          ./scripts/publish-r2-registry.sh \
            webclaw_full \
            "${{ steps.version.outputs.label }}" \
            "webclaw_full-amd64-${{ steps.version.outputs.label }}.tar.gz" \
            "webclaw_full-arm64-${{ steps.version.outputs.label }}.tar.gz"

  # ─────────────────────────────────────────────────────────────
  # After build-lite: update Docker Hub READMEs + export lite to R2
  # ─────────────────────────────────────────────────────────────
  update-readme-lite:
    needs: build-lite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/webclaw_lite
          readme-filepath: ./README.md

  export-lite-to-r2:
    needs: build-lite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Compute version label
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "label=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "image_tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "label=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install AWS CLI
        run: pip install --quiet awscli

      - name: Export webclaw_lite to tar.gz
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/webclaw_lite:${{ steps.version.outputs.image_tag }}"
          AMD64_EXPORT_REF="land007/webclaw_lite:latest"
          ARM64_EXPORT_REF="land007/webclaw_lite:latest"

          docker pull --platform linux/amd64 "$IMAGE_REF"
          docker tag "$IMAGE_REF" "$AMD64_EXPORT_REF"
          echo "AMD64_DIGEST=$(docker inspect $AMD64_EXPORT_REF --format '{{.Id}}')" >> $GITHUB_ENV
          docker save "$AMD64_EXPORT_REF" \
            | gzip > webclaw_lite-amd64-${{ steps.version.outputs.label }}.tar.gz

          docker pull --platform linux/arm64 "$IMAGE_REF"
          docker tag "$IMAGE_REF" "$ARM64_EXPORT_REF"
          echo "ARM64_DIGEST=$(docker inspect $ARM64_EXPORT_REF --format '{{.Id}}')" >> $GITHUB_ENV
          docker save "$ARM64_EXPORT_REF" \
            | gzip > webclaw_lite-arm64-${{ steps.version.outputs.label }}.tar.gz

      - name: Resolve manifest digests
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/webclaw_lite:${{ steps.version.outputs.image_tag }}"
          python3 - <<'PY' "$IMAGE_REF" >> "$GITHUB_ENV"
          import json, re, subprocess, sys

          ref = sys.argv[1]
          inspect_output = subprocess.check_output(["docker", "buildx", "imagetools", "inspect", ref], text=True)
          match = re.search(r"^Digest:\s*(sha256:[0-9a-f]+)$", inspect_output, re.MULTILINE)
          index_digest = match.group(1) if match else ""
          raw = subprocess.check_output(["docker", "buildx", "imagetools", "inspect", "--raw", ref], text=True).strip()
          index_manifest = json.loads(raw)

          def find_platform_manifest_digest(arch):
              for item in index_manifest.get("manifests", []):
                  platform = item.get("platform") or {}
                  if platform.get("os") == "linux" and platform.get("architecture") == arch:
                      return item.get("digest", "")
              return ""

          amd64_manifest_digest = find_platform_manifest_digest("amd64")
          arm64_manifest_digest = find_platform_manifest_digest("arm64")
          print(f"INDEX_DIGEST={index_digest}")
          print(f"AMD64_MANIFEST_DIGEST={amd64_manifest_digest}")
          print(f"ARM64_MANIFEST_DIGEST={arm64_manifest_digest}")
          PY

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PUBLIC_BASE_URL: https://launcher.qhkly.com
          INDEX_DIGEST: ${{ env.INDEX_DIGEST }}
          AMD64_DIGEST: ${{ env.AMD64_DIGEST }}
          ARM64_DIGEST: ${{ env.ARM64_DIGEST }}
          AMD64_MANIFEST_DIGEST: ${{ env.AMD64_MANIFEST_DIGEST }}
          ARM64_MANIFEST_DIGEST: ${{ env.ARM64_MANIFEST_DIGEST }}
        run: |
          chmod +x ./scripts/publish-r2-registry.sh
          ./scripts/publish-r2-registry.sh \
            webclaw_lite \
            "${{ steps.version.outputs.label }}" \
            "webclaw_lite-amd64-${{ steps.version.outputs.label }}.tar.gz" \
            "webclaw_lite-arm64-${{ steps.version.outputs.label }}.tar.gz"
